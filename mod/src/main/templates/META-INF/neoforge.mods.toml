modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
# Client-only: dedicated servers must not require this mod
displayTest="IGNORE_ALL_VERSION"
authors="skps9"
description='''
Client-only AI helper for understanding modpacks.
Opens with a keybind (primary); /ai is a backup.
Uses the loaded mod list to focus local pack context and online search.
'''

[[mixins]]
config="packai.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="jei"
    type="optional"
    versionRange="[19.8,)"
    ordering="NONE"
    side="CLIENT"
